{% extends 'base/base.html' %}

{% block title %}
    Login
{% endblock title %}

{% block body %}
    {% load crispy_forms_tags %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 shadow-lg rounded-4 p-5 bg-white">
                <h2 class="mb-4 text-center fw-bold">Login</h2>
                
                <form action="" method="post" novalidate>
                    {% csrf_token %}
                    
                    {{ form|crispy }}

                    <button class="btn btn-success w-100 mt-3 py-2" type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>
{% endblock body %}
