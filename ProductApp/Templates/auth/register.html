{% extends 'base/base.html' %}

{% block title %}
    Register
{% endblock title %}

{% block body %}
    {% load crispy_forms_tags %}

    <div class="container mt-5">
        <div class="row justify-content-center shadow-lg rounded-4">
            <div class="col-6">
                <h2 class="mb-4">Register</h2>
                
                <form action="" method="post" novalidate>
                    {% csrf_token %}
                    
                    {{ form|crispy }}

                    <button class="btn btn-success w-100 mt-3" type="submit">Register Now</button>
                </form>
            </div>
        </div>
    </div>
{% endblock body %}
